# UDS tasks for local DRP development.
#
# Run with the maru-runner bundled in the UDS CLI:
#   uds run backend      # start the Flask REST API on :3000
#
# The policy assistant's RAG pipeline runs in-process in the backend
# (see backend/rag.py) — there is no separate service to start.

variables:
  - name: BACKEND_PORT
    default: "3000"

tasks:
  - name: backend
    description: "Start the Flask REST API on :${BACKEND_PORT}"
    actions:
      - description: "Sync the uv environment, then run the app"
        dir: backend
        cmd: |
          uv sync
          uv run python app.py

  - name: backend-build
    description: "Build the combined app image (Flask API + built React SPA)"
    actions:
      - description: "Build the Docker image from the DRP dir as context"
        # Context is the DeploymentReadinessPlatform dir (this dir) so the build can see both backend/ and frontend/; the Dockerfile lives in backend/.
        # DOCKER_BUILDKIT=1 enables BuildKit, which the Dockerfile's RUN --mount cache/bind mounts require.
        cmd: DOCKER_BUILDKIT=1 docker build -f backend/Dockerfile -t drp .
