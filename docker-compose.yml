# DRP deployment artifact — NOT used during development.
# Proves the app is containerized and portable. Services reach each other by
# service name. No local DB: all services connect to the shared Supabase via
# env vars. The policy-assistant RAG pipeline runs in-process in the gateway
# (see backend/rag.py) — there is no separate RAG service.

services:
  gateway:
    build: ./backend
    env_file: ./.env
    environment:
      PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - gateway
