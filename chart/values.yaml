# External domain the app is exposed under (→ drp.<domain>). Injected from the
# Zarf DOMAIN variable via values/values.yaml; used by the UDS Package CR for
# the SSO redirect URI.
domain: "uds.dev"

# SSO / Authservice fronts the whole app for authentication only. There is no
# group-based gate: roles are owned by the roster DB (member_roles) and resolved
# by the backend from the JWT `edipi` claim. See docs/configuration.md.

image:
  repository: ghcr.io/defenseunicorns/deployment-readiness-platform
  tag: "0.1.0"
  # Always pull: the image tag is static (0.1.0) but its contents change on every
  # `uds run build`. With IfNotPresent the node keeps the cached 0.1.0 and never
  # picks up rebuilt code, so a redeploy silently runs the old image. Always makes
  # the pod fetch the current 0.1.0 from the in-cluster registry on each restart.
  # For production, pin a unique/digest-based tag instead of relying on this.
  pullPolicy: Always

replicaCount: 1

config:
  # Port gunicorn binds; must match the image EXPOSE. Fixed here (not a deploy-time var) — the Service fronts it via a named targetPort, so there's no reason to retune it per environment.
  backendPort: "3000"
  openaiModel: "gpt-4o-mini"
  backendDebug: "false"
  sendgridFromEmail: "hangar2apps@gmail.com"

secrets:
  supabaseConnectionString: ""
  openaiApiKey: ""
  supabaseServiceRoleKey: ""
  sendgridApiKey: ""
  supabaseUrl: ""

service:
  type: ClusterIP
  port: 3000

# Probes hit the API health endpoint (app.py: GET /api/health → 200).
probes:
  path: /api/health

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Pod/container hardening. runAsUser is numeric because the image's USER is the non-numeric `app`; without a number, kubelet's runAsNonRoot check refuses to start the pod. See docs/justifications.md.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  # The app does not write to its filesystem at runtime, but gunicorn and some libraries use /tmp; an emptyDir is mounted there (see deployment.yaml) so this can stay true. Flip to false + drop the mount only if a library needs more.
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
