apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "drp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "drp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "drp.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when the secret changes so new credentials are picked up.
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.config.backendPort | int }}
              protocol: TCP
          env:
            - name: BACKEND_PORT
              value: {{ .Values.config.backendPort | quote }}
            - name: OPENAI_MODEL
              value: {{ .Values.config.openaiModel | quote }}
            - name: BACKEND_DEBUG
              value: {{ .Values.config.backendDebug | quote }}
            - name: SENDGRID_FROM_EMAIL
              value: {{ .Values.config.sendgridFromEmail | quote }}
            - name: SCHEDULER_ENABLED
              value: "true"
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}
                  key: SUPABASE_URL
            - name: SUPABASE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}
                  key: SUPABASE_CONNECTION_STRING
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}
                  key: OPENAI_API_KEY
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}
                  key: SENDGRID_API_KEY
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}
                  key: SUPABASE_SERVICE_ROLE_KEY
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.securityContext.readOnlyRootFilesystem }}
          volumeMounts:
            # gunicorn / libraries need a writable temp dir under a read-only rootfs.
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if .Values.securityContext.readOnlyRootFilesystem }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
