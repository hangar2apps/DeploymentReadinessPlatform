apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: deployment-readiness-platform
  namespace: drp
spec:
  # One origin: the Flask app serves both /api and the React SPA, so a single exposure on the tenant gateway covers the whole app.
  network:
    expose:
      - service: drp
        selector:
          app: drp
        host: drp
        gateway: tenant
        port: 3000

    allow:
      # Supabase Postgres (pgvector). External over the internet — direct 5432 and the transaction pooler 6543.
      # This will eventually be replaced by either RDS or a postgres UDS package.
      - direction: Egress
        selector:
          app: drp
        remoteGenerated: Anywhere
        ports:
          - 5432
          - 6543
        description: "Supabase Postgres (pgvector) — DRP data + RAG document chunks"

      # OpenAI API (api.openai.com:443) — commander data-chat LLM + policy RAG embeddings/completions.
      - direction: Egress
        selector:
          app: drp
        remoteGenerated: Anywhere
        port: 443
        description: "OpenAI API (api.openai.com) — chat + embeddings over HTTPS"

  # ─── SSO ──────────────────────────────────────────────────────────────────
  # DRP has no built-in auth today. To put UDS authservice in front of the whole
  # app (no app code changes), uncomment and the operator creates a Keycloak
  # client + protects the matched pods. See docs/configuration.md.
  #
  # sso:
  #   - name: Deployment Readiness Platform
  #     clientId: uds-drp
  #     redirectUris:
  #       - "https://drp.uds.dev/login/oauth/callback"
  #     enableAuthserviceSelector:
  #       app: drp
